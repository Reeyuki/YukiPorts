<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Slendrina the Cellar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
:root {
  color-scheme: dark;
}

html, body {
  height: 100%;
  margin: 0;
  background: #0a0a0a;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

#app {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
}

#unityWrap {
  position: relative;
  width: min(1280px, 100vw);
  height: min(720px, 100vh);
  background: #111;
}

#unityContainer {
  position: absolute;
  inset: 0;
}

#overlay {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  background: rgba(0, 0, 0, 0.85);
}

#card {
  width: min(480px, calc(100% - 32px));
  padding: 16px;
  background: #151515;
  border: 1px solid #2a2a2a;
}

#title {
  font-size: 16px;
  color: #e6e6e6;
  margin: 0 0 10px 0;
}

#status {
  font-size: 13px;
  color: #bdbdbd;
  margin: 0 0 10px 0;
  display: flex;
  justify-content: space-between;
}

#bar {
  height: 8px;
  background: #2a2a2a;
  overflow: hidden;
}

#fill {
  height: 100%;
  width: 0%;
  background: #e6e6e6;
}

#hint {
  margin: 10px 0 0 0;
  font-size: 12px;
  color: #8a8a8a;
}

#fullscreenBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 5;
  border: 1px solid #2a2a2a;
  background: #151515;
  color: #e6e6e6;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
}

#fullscreenBtn:disabled {
  opacity: 0.4;
  cursor: default;
}

#error {
  margin-top: 10px;
  font-size: 12px;
  color: #ff5555;
  display: none;
  white-space: pre-wrap;
}
    </style>
  </head>
  <body>
    <div id="app">
      <div id="unityWrap">
        <button id="fullscreenBtn" type="button" disabled>Fullscreen</button>
        <div id="unityContainer"></div>
        <div id="overlay">
          <div id="card">
            <p id="title">Slendrina the Cellar</p>
            <p id="status"><span id="statusText">Preparing...</span><span id="percent">0%</span></p>
            <div id="bar"><div id="fill"></div></div>
            <div id="error"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const assetBaseUrl = "https://cdn.jsdelivr.net/gh/Reeyuki/slenderina@main/"
      const buildUrl = assetBaseUrl + "Build/"
      const productName = "Slendrina the Cellar"
      const splitAssets = {
        data: { file: "slenderina.data.unityweb", parts: 5 },
        wasmCode: { file: "slenderina.wasm.code.unityweb", parts: 0 },
        wasmFramework: { file: "slenderina.wasm.framework.unityweb", parts: 0 },
        loader: { file: "UnityLoader.js", parts: 0 },
        config: { file: "slenderina.json", parts: 0 }
      }

      const overlay = document.getElementById("overlay")
      const statusText = document.getElementById("statusText")
      const percent = document.getElementById("percent")
      const fill = document.getElementById("fill")
      const fullscreenBtn = document.getElementById("fullscreenBtn")
      const errorBox = document.getElementById("error")

      const clamp01 = (v) => Math.max(0, Math.min(1, v))
      const setProgress = (p, text) => {
        const v = clamp01(p)
        fill.style.width = (v * 100).toFixed(1) + "%"
        percent.textContent = Math.round(v * 100) + "%"
        if (text) statusText.textContent = text
      }
      const showError = (msg) => {
        errorBox.style.display = "block"
        errorBox.textContent = msg
      }

      const fetchSplitFile = async (baseUrl, filename, parts, onPart) => {
        const pad2 = (n) => String(n).padStart(2, "0")
        const urls = Array.from({ length: parts }, (_, i) => baseUrl + filename + pad2(i))
        const results = await Promise.all(urls.map((u, i) => fetch(u).then(async (r) => {
          if (!r.ok) throw new Error("Failed to fetch " + u + " (" + r.status + ")")
          const b = await r.arrayBuffer()
          if (onPart) onPart(i, parts, b.byteLength)
          return b
        })))
        let total = 0
        for (const b of results) total += b.byteLength
        const out = new Uint8Array(total)
        let off = 0
        for (const b of results) { out.set(new Uint8Array(b), off); off += b.byteLength }
        return out.buffer
      }

      const loadScript = (src) => new Promise((resolve, reject) => {
        const s = document.createElement("script")
        s.src = src
        s.async = true
        s.onload = resolve
        s.onerror = () => reject(new Error("Failed to load script: " + src))
        document.head.appendChild(s)
      })

      const installSplitAwareXHR = ({ matchUrlEndsWith, bufferPromise }) => {
        const NativeXHR = window.XMLHttpRequest
        const matches = (u) => {
          const s = String(u || "")
          const clean = s.split("#")[0].split("?")[0]
          return clean.endsWith(matchUrlEndsWith)
        }
        class SplitXHR {
          constructor() {
            this._native = null
            this._target = false
            this._url = ""
            this._async = true
            this._method = "GET"
            this._responseType = ""
            this._headers = []
            this._listeners = {}
            this.readyState = 0
            this.status = 0
            this.statusText = ""
            this.response = null
            this.responseText = ""
            this.onreadystatechange = null
            this.onprogress = null
            this.onload = null
            this.onerror = null
            this.onabort = null
            this.onloadend = null
            this.ontimeout = null
            this.timeout = 0
            this.withCredentials = false
          }
          open(method, url, async = true) {
            this._method = method
            this._url = String(url)
            this._async = async !== false
            this._target = method === "GET" && matches(this._url)
            if (!this._target) {
              this._native = new NativeXHR()
              this._wireNative()
              this._native.open(method, url, this._async)
            } else {
              this.readyState = 1
              this._emitReady()
            }
          }
          _emitReady() { if (typeof this.onreadystatechange === "function") this.onreadystatechange() }
          _emit(evtName) {
            const evt = { target: this, type: evtName }
            const fn = this["on" + evtName]
            if (typeof fn === "function") fn(evt)
            const listeners = this._listeners[evtName]
            if (listeners) listeners.forEach(f => f(evt))
          }
          _wireNative() {
            const n = this._native
            n.onreadystatechange = () => {
              this.readyState = n.readyState
              this.status = n.status
              this.statusText = n.statusText
              this._emitReady()
            }
            n.onprogress = (e) => { if (typeof this.onprogress === "function") this.onprogress(e) }
            n.onload = () => {
              this.response = n.response
              const rt = n.responseType
              this.responseText = (rt === "" || rt === "text") ? n.responseText : ""
              this.status = n.status
              this.statusText = n.statusText
              this._emit("load")
            }
            n.onerror = () => { this.status = n.status; this.statusText = n.statusText; this._emit("error") }
            n.onabort = () => this._emit("abort")
            n.onloadend = () => this._emit("loadend")
            n.ontimeout = () => this._emit("timeout")
          }
          addEventListener(type, fn) {
            if (this._native) { this._native.addEventListener(type, fn); return }
            if (!this._listeners[type]) this._listeners[type] = []
            this._listeners[type].push(fn)
          }
          removeEventListener(type, fn) {
            if (this._native) { this._native.removeEventListener(type, fn); return }
            if (this._listeners[type]) this._listeners[type] = this._listeners[type].filter(f => f !== fn)
          }
          setRequestHeader(k, v) { if (this._native) this._native.setRequestHeader(k, v); else this._headers.push([k, v]) }
          getResponseHeader(k) { return this._native ? this._native.getResponseHeader(k) : null }
          getAllResponseHeaders() { return this._native ? this._native.getAllResponseHeaders() : "" }
          overrideMimeType(m) { if (this._native) this._native.overrideMimeType(m) }
          abort() { if (this._native) this._native.abort(); else this._emit("abort") }
          send(body = null) {
            if (!this._target) return this._native.send(body)
            this.readyState = 2
            this.status = 200
            this.statusText = "OK"
            this._emitReady()
            bufferPromise().then((buf) => {
              this.response = buf
              this.responseText = ""
              this.readyState = 4
              this._emitReady()
              this._emit("load")
              this._emit("loadend")
            }).catch(() => {
              this.status = 0
              this.statusText = ""
              this.readyState = 4
              this._emitReady()
              this._emit("error")
              this._emit("loadend")
            })
          }
          get responseType() { return this._native ? this._native.responseType : this._responseType }
          set responseType(v) { this._responseType = String(v || ""); if (this._native) this._native.responseType = v }
        }
        window.XMLHttpRequest = SplitXHR
        return () => { window.XMLHttpRequest = NativeXHR }
      }

      const start = async () => {
        document.title = productName
        setProgress(0, "Fetching runtime...")
        const loaderSrc = buildUrl + splitAssets.loader.file
        const jsonUrl = buildUrl + splitAssets.config.file
        const dataVirtualSuffix = splitAssets.data.file
        let dataLoadedParts = 0
        let dataBytes = 0
        const dataPromise = splitAssets.data.parts > 0
          ? fetchSplitFile(buildUrl, splitAssets.data.file, splitAssets.data.parts, (i, total, bytes) => {
              dataLoadedParts = i + 1
              dataBytes += bytes
              setProgress(Math.min(0.45, (dataLoadedParts / total) * 0.45), "Downloading data " + dataLoadedParts + "/" + total)
            })
          : fetch(buildUrl + splitAssets.data.file).then(async (r) => {
              if (!r.ok) throw new Error("Failed to fetch data (" + r.status + ")")
              return await r.arrayBuffer()
            })

        const restoreXHR = installSplitAwareXHR({ matchUrlEndsWith: dataVirtualSuffix, bufferPromise: () => dataPromise })

        try {
          await loadScript(loaderSrc)
          setProgress(0.5, "Initializing...")
          const unityInstance = UnityLoader.instantiate("unityContainer", jsonUrl, {
            onProgress: (_, p) => {
              const mapped = 0.5 + clamp01(p) * 0.5
              setProgress(mapped, "Loading game...")
              if (p >= 1) {
                overlay.style.display = "none"
                restoreXHR()
              }
            }
          })
          fullscreenBtn.disabled = false
          fullscreenBtn.addEventListener("click", async () => {
            try {
              if (unityInstance && typeof unityInstance.SetFullscreen === "function") unityInstance.SetFullscreen(1)
              const el = document.getElementById("unityContainer")
              if (el && !document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen()
            } catch {}
          })
        } catch (e) {
          showError(String(e && e.message ? e.message : e))
          setProgress(1, "Failed to load")
          restoreXHR()
        }
      }

      start()
    </script>
  </body>
</html>
