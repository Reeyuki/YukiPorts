<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reeyuki Ports</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn.jsdelivr.net/gh/Reeyuki/YukiPorts@main/favicon.ico"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      :root {
        --bg0: #111111;
        --bg1: #191919;
        --panel: rgba(255, 255, 255, 0.03);
        --panel2: rgba(255, 255, 255, 0.055);
        --stroke: rgba(255, 255, 255, 0.1);
        --stroke2: rgba(255, 255, 255, 0.18);
        --text: #d4d4d4;
        --muted: rgba(212, 212, 212, 0.5);
        --muted2: rgba(212, 212, 212, 0.3);
        --accent: #c0392b;
        --accent2: #a93226;
        --danger: #e05555;
        --radius: 6px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          Helvetica,
          Arial;
        background: var(--bg0);
        min-height: 100vh;
        color: var(--text);
        padding: 28px;
        letter-spacing: 0.2px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        font-size: 2.8rem;
        font-weight: 650;
        margin-bottom: 8px;
        letter-spacing: -0.02em;
      }

      h1 i {
        margin-right: 10px;
        color: var(--accent);
        opacity: 0.9;
      }

      .stats {
        text-align: center;
        margin-bottom: 22px;
        color: var(--muted2);
        font-size: 0.9rem;
      }

      .stats span {
        color: var(--accent);
        font-weight: 600;
      }

      .search-container {
        margin-bottom: 22px;
        display: flex;
        justify-content: center;
      }

      .search-input {
        width: 100%;
        max-width: 500px;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--stroke);
        background: var(--panel);
        color: var(--text);
        font-size: 0.95rem;
        outline: none;
        transition:
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .search-input:focus {
        border-color: var(--accent);
        background: var(--panel2);
      }

      .search-input::placeholder {
        color: var(--muted);
      }

      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .game-card {
        background: var(--panel);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease,
          box-shadow 0.18s ease;
        outline: none;
      }

      .game-card:hover {
        transform: translateY(-3px);
        border-color: var(--stroke2);
        background: var(--panel2);
      }

      .game-card:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        transform: translateY(-3px);
      }

      .game-card.keyboard-selected {
        border-color: var(--accent);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        transform: translateY(-3px);
      }

      .game-icon {
        width: 100%;
        height: 180px;
        object-fit: contain;
        background: rgba(0, 0, 0, 0.25);
        border-bottom: 1px solid var(--stroke);
        padding: 8px;
      }

      .game-title {
        font-size: 1.05rem;
        font-weight: 600;
        padding: 0 14px;
        color: #fff;
      }

      .game-actions {
        display: flex;
        gap: 8px;
        padding: 0 14px 14px;
      }

      .btn {
        flex: 1;
        padding: 6px 8px;
        border-radius: 3px;
        border: 1px solid var(--stroke2);
        background: #242424;
        color: var(--text);
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.1s ease,
          border-color 0.1s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        outline: none;
        letter-spacing: 0.3px;
      }

      .btn:hover {
        background: #2e2e2e;
        border-color: rgba(255, 255, 255, 0.25);
      }

      .btn:active {
        background: #1a1a1a;
      }

      .btn:focus-visible {
        border-color: var(--accent);
      }

      .btn-play {
        background: #c0392b;
        border-color: #c0392b;
        color: #111;
        font-weight: 600;
      }

      .btn-play:hover {
        background: #a93226;
        border-color: #a93226;
      }

      .btn-play:active {
        background: #922b21;
      }

      .btn-copy {
        color: var(--muted);
      }

      .btn-download {
        color: var(--accent);
        border-color: rgba(192, 57, 43, 0.25);
      }

      .fullscreen-wrapper {
        position: fixed;
        inset: 0;
        background: #000;
        display: none;
        z-index: 9999;
      }

      .fullscreen-wrapper.active {
        display: flex;
        flex-direction: column;
      }

      .fullscreen-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.75);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .fullscreen-title {
        font-size: 0.95rem;
        color: #fff;
        opacity: 0.9;
      }

      .game-frame {
        width: 100%;
        height: 100%;
        border: none;
      }

      .btn-close {
        background: #2a1a1a;
        border: 1px solid rgba(224, 85, 85, 0.4);
        color: #e07070;
        padding: 7px 12px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: background 0.1s ease;
      }

      .btn-close:hover {
        background: #3a1f1f;
      }

      .btn-fullscreen {
        background: #242424;
        border: 1px solid var(--stroke2);
        color: var(--text);
        padding: 7px 12px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: background 0.1s ease;
      }

      .btn-fullscreen:hover {
        background: #2e2e2e;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(10, 15, 25, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 0.85rem;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
      }

      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        display: none;
      }

      .loading.show {
        display: block;
      }

      .loading::after {
        content: ".";
        animation: dots 1.2s steps(4, end) infinite;
      }

      @keyframes dots {
        0% {
          content: ".";
        }
        33% {
          content: "..";
        }
        66% {
          content: "...";
        }
        100% {
          content: ".";
        }
      }

      .footer {
        margin-top: 40px;
        text-align: center;
        padding: 20px;
        border-top: 1px solid var(--stroke);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.18s ease;
      }

      .footer a:hover {
        color: var(--accent2);
        text-decoration: underline;
      }

      .footer a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 2px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        margin: 24px 0 16px;
        background: var(--panel);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        cursor: pointer;
        transition:
          border-color 0.18s ease,
          background 0.18s ease;
        user-select: none;
      }

      .section-header:hover {
        border-color: var(--stroke2);
        background: var(--panel2);
        transform: translateY(-1px);
      }

      .section-header:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      .section-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text);
      }

      .section-icon {
        transition: transform 0.3s ease;
        color: var(--muted);
      }

      .section-header.collapsed .section-icon {
        transform: rotate(-90deg);
      }

      .section-content {
        overflow: hidden;
        transition:
          max-height 0.3s ease,
          opacity 0.3s ease;
      }

      .section-content.collapsed {
        max-height: 0;
        opacity: 0;
      }

      .section-content:not(.collapsed) {
        max-height: 2000px;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><i class="fas fa-gamepad"></i> Reeyuki Webports</h1>
      <div class="stats"><span id="gameCount">0</span> games available</div>

      <div class="search-container">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search games..."
        />
      </div>

      <div class="games-grid" id="gamesGrid"></div>

      <div class="section-header" id="baldiHeader">
        <span class="section-title">Baldi Mods</span>
        <i class="fas fa-chevron-down section-icon"></i>
      </div>

      <div class="section-content" id="baldiContent">
        <div class="games-grid" id="baldiGrid"></div>
      </div>
    </div>

    <div class="fullscreen-wrapper" id="fullscreenWrapper">
      <div class="fullscreen-header">
        <span class="fullscreen-title" id="fullscreenTitle">Game</span>
        <div style="display: flex; gap: 10px">
          <button class="btn-fullscreen" onclick="toggleFullscreen()">
            <i class="fas fa-expand"></i> Fullscreen
          </button>
          <button class="btn-close" onclick="closeFullscreen()">
            <i class="fas fa-times"></i> Close
          </button>
        </div>
      </div>
      <iframe class="game-frame" id="gameFrame" allowfullscreen></iframe>
    </div>

    <div class="toast" id="toast">URL copied to clipboard!</div>
    <div class="loading" id="loading">Loading</div>

    <div class="footer">
      Hello. I started webporting in april 2026 and got somehow addicted.
      <a href="https://yukios.netlify.app" target="_blank"
        >Explore YukiOS for more games!</a
      >
    </div>

    <div class="footer">
      <a href="https://reeyuki.nekoweb.org" target="_blank">Visit My Site</a>
    </div>

      import playtimeHellBear5vanIcon from "./icons/playtimeHellBear5van.webp";

      import slenderinaIcon from "./icons/slenderina.webp";
      import wizardsIcon from "./icons/wizard.webp";
      import fniaIcon from "./icons/fnia.webp";
      import helltakerIcon from "./icons/helltaker.webp";

      let currentBlobUrl = null;

      const games = [
        {
          title: "Angry Birds 2",
          file: "angry2.html",
          icon: angryBirds2Icon,
          description:
            "The classic physics-based puzzle game returns with new birds, new levels, and exciting challenges. Destroy the pigs' fortresses using your slingshot skills!",
        },
        {
          title: "Slime Rancher",
          file: "slime.html",

        },
        {
          title: "TABS",

          icon: tabsIcon,
          description:
            "Be the leader of wobblers from ancient lands, spooky places, and fantasy worlds. Watch them fight in simulations made with the wobbliest physics system ever created",
        },
        {

        },
        {
          title: "Inscryption",
          file: "inscryption.html",

            "Inscryption is an inky black card-based odyssey that blends the deckbuilding roguelike, escape-room style puzzles, and psychological horror into a blood-laced smoothie. Darker still are the secrets inscrybed upon the cards... ",
        },
        {

          icon: lobotomyIcon,
          description:
            "A roguelite monster-management simulation inspired by the likes of the SCP Foundation, Cabin in the Woods, and Warehouse 13. Order your employees to perform work with the creatures and watch as it unfolds; harness greater energy, and expand the facility ",
        },
        {

          file: "nightwoods.html",
          icon: nightIcon,
          description:
            "NIGHT IN THE WOODS is an adventure game focused on exploration, story, and character, featuring dozens of characters to meet and lots to do across a lush, vibrant world.",
        },
        {
          title: "Plague Inc Evolved",

        },

          file: "daddy.html",
          icon: daddyIcon,
          description:
            " Who's Your Daddy is a casual multiplayer game featuring a clueless father attempting to prevent his infant son from certain death. Play with up to 7 of your friends, and test your parenting skills in a competitive setup with wacky physics and over 67 potentially ominous household items.",
        },
        {

        {
          title: "Helltaker",
          file: "helltaker.html",

            "Helltaker is a short game about sharply dressed demon girls.",

        {
          title: "Slenderina The Cellar",

          description: `This is the story of Slendrina The Cellar. Now she has become more evil than before and hates it when someone intruding on her territory. She will do anything to stop you. Whatever you do .... do not look back!

        },

      const baldiGames = [
        { title: "Minus Three", file: "minusThree.html", icon: minusThreeIcon },
        {
          title: "Baldi Balds The Universe",
          file: "baldiBalds.html",
          icon: baldiBaldsIcon,
        },
        {
          title: "Baldi's Basics: Teaching On Twos",
          file: "baldisBasicsTeachingOnTwos.html",
          icon: baldisBasicsTeachingOnTwosIcon,
        },
        {
          title: "Playtime Hell & Bear 5 Van",
          file: "playtimeHellBear5van.html",
          icon: playtimeHellBear5vanIcon,
        },
        {
          title: "Pneumonoultramicroscopicsilicovolcanoconiosis",
          file: "pneumo.html",
          icon: pneumoIcon,
        },
        {
          title: "The Math Is Leaking",
          file: "themathisleaking.html",
          icon: theMathIsLeakingIcon,
        },
        { title: "Three", file: "three.html", icon: threeIcon },
        {
          title: "Where's Baldi",
          file: "wheresBaldi.html",
          icon: wheresBaldiIcon,
        },
        {
          title: "Antidisestablishmentarianism",
          file: "Antidisestablishmentarianism.html",
          icon: AntidisestablishmentarianismIcon,
        },
      ];

      const CDN_BASE =
        "https://cdn.jsdelivr.net/gh/Reeyuki/YukiPorts@main/html/";
      const GITHUB_BASE =
        "https://github.com/Reeyuki/YukiPorts/tree/main/html/";

      document.getElementById("gameCount").textContent =
        games.length + baldiGames.length;

      const gamesGrid = document.getElementById("gamesGrid");
      const baldiGrid = document.getElementById("baldiGrid");
      const searchInput = document.getElementById("searchInput");
      const baldiHeader = document.getElementById("baldiHeader");
      const baldiContent = document.getElementById("baldiContent");

      baldiHeader.addEventListener("click", () => {
        baldiHeader.classList.toggle("collapsed");
        baldiContent.classList.toggle("collapsed");
      });

      searchInput.addEventListener("input", (e) => {
        const searchTerm = e.target.value.toLowerCase();

        const mainCards = gamesGrid.querySelectorAll(".game-card");
        mainCards.forEach((card, index) => {
          const game = games[index];
          const matches = game.title.toLowerCase().includes(searchTerm);
          card.style.display = matches ? "flex" : "none";
        });

        const baldiCards = baldiGrid.querySelectorAll(".game-card");
        baldiCards.forEach((card, index) => {
          const game = baldiGames[index];
          const matches = game.title.toLowerCase().includes(searchTerm);
          card.style.display = matches ? "flex" : "none";
        });

        if (
          searchTerm &&
          baldiGames.some((game) =>
            game.title.toLowerCase().includes(searchTerm),
          )
        ) {
          baldiHeader.classList.remove("collapsed");
          baldiContent.classList.remove("collapsed");
        }
      });

      function renderGames() {
        gamesGrid.innerHTML = "";
        games.forEach((game) => {
          const jsdelivrUrl = CDN_BASE + game.file;
          const githubUrl = GITHUB_BASE + game.file;
          const escapedTitle = game.title.replace(/'/g, "\\'");

          const card = document.createElement("div");
          card.className = "game-card";
          card.style.cursor = "pointer";
          card.innerHTML = `
                <img class="game-icon" src="${game.icon}" alt="${game.title}" />
                <div class="game-title">${game.title}</div>
                <div class="game-actions">
                    <button class="btn btn-play" onclick="event.stopPropagation(); playGame('${escapedTitle}', '${jsdelivrUrl}')"><i class="fas fa-play"></i> Play</button>
                    <button class="btn btn-copy" onclick="event.stopPropagation(); copyUrl('${jsdelivrUrl}', '${escapedTitle}')"><i class="fas fa-copy"></i> Copy URL</button>
                    <button class="btn btn-download" onclick="event.stopPropagation(); downloadHtml('${jsdelivrUrl}', '${game.file}', '${escapedTitle}')"><i class="fas fa-download"></i> Download</button>
                </div>
            `;
          card.setAttribute("tabindex", "0");
          card.setAttribute("role", "button");
          card.setAttribute("aria-label", game.title);
          card.addEventListener("click", () =>
            playGame(escapedTitle, jsdelivrUrl),
          );
          card.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              playGame(escapedTitle, jsdelivrUrl);
            }
          });
          gamesGrid.appendChild(card);
        });
      }

      function renderBaldiGames() {
        baldiGrid.innerHTML = "";
        baldiGames.forEach((game) => {
          const jsdelivrUrl = CDN_BASE + game.file;
          const githubUrl = GITHUB_BASE + game.file;
          const escapedTitle = game.title.replace(/'/g, "\\'");

          const card = document.createElement("div");
          card.className = "game-card";
          card.style.cursor = "pointer";
          card.innerHTML = `
                <img class="game-icon" src="${game.icon}" alt="${game.title}" />
                <div class="game-title">${game.title}</div>
                <div class="game-actions">
                    <button class="btn btn-play" onclick="event.stopPropagation(); playGame('${escapedTitle}', '${jsdelivrUrl}')"><i class="fas fa-play"></i> Play</button>
                    <button class="btn btn-copy" onclick="event.stopPropagation(); copyUrl('${jsdelivrUrl}', '${escapedTitle}')"><i class="fas fa-copy"></i> Copy URL</button>
                    <button class="btn btn-download" onclick="event.stopPropagation(); downloadHtml('${jsdelivrUrl}', '${game.file}', '${escapedTitle}')"><i class="fas fa-download"></i> Download</button>
                </div>
            `;
          card.setAttribute("tabindex", "0");
          card.setAttribute("role", "button");
          card.setAttribute("aria-label", game.title);
          card.addEventListener("click", () =>
            playGame(escapedTitle, jsdelivrUrl),
          );
          card.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              playGame(escapedTitle, jsdelivrUrl);
            }
          });
          baldiGrid.appendChild(card);
        });
      }

      renderGames();
      renderBaldiGames();

      function playGame(title, url) {
        const wrapper = document.getElementById("fullscreenWrapper");
        const frame = document.getElementById("gameFrame");
        const titleEl = document.getElementById("fullscreenTitle");
        const loading = document.getElementById("loading");

        titleEl.textContent = title;
        loading.classList.add("show");
        wrapper.classList.add("active");

        if (title === "Wizards In Shorts") {
          frame.src = "https://wizards-in-shorts.vercel.app";
          loading.classList.remove("show");
          return;
        }

        if (title === "In Stars And Time") {
          frame.src = "https://somestargame.pages.dev";
          loading.classList.remove("show");
          return;
        }

        fetch(url)
          .then((response) => response.text())
          .then((html) => {
            if (currentBlobUrl) {
              URL.revokeObjectURL(currentBlobUrl);
            }
            const blob = new Blob([html], { type: "text/html" });
            currentBlobUrl = URL.createObjectURL(blob);
            frame.src = currentBlobUrl;
            loading.classList.remove("show");
          })
          .catch((err) => {
            console.error("Failed to load game:", err);
            showToast("Failed to load game");
            loading.classList.remove("show");
            closeFullscreen();
          });
      }

      function closeFullscreen() {
        const wrapper = document.getElementById("fullscreenWrapper");
        const frame = document.getElementById("gameFrame");

        wrapper.classList.remove("active");
        frame.src = "";

        if (currentBlobUrl) {
          URL.revokeObjectURL(currentBlobUrl);
          currentBlobUrl = null;
        }
      }

      function toggleFullscreen() {
        const frame = document.getElementById("gameFrame");
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          frame.requestFullscreen();
        }
      }

      function copyUrl(url, title) {
        const urlToCopy =
          title === "Wizards In Shorts"
            ? "https://wizards-in-shorts.vercel.app/"
            : url;
        navigator.clipboard
          .writeText(urlToCopy)
          .then(() => {
            showToast("URL copied to clipboard!");
          })
          .catch((err) => {
            showToast("Failed to copy URL");
            console.error("Failed to copy:", err);
          });
      }

      function downloadHtml(url, filename, title) {
        if (title === "Wizards In Shorts") {
          showToast("This game cannot be downloaded");
          return;
        }
        fetch(url)
          .then((response) => response.text())
          .then((html) => {
            const blob = new Blob([html], { type: "text/html" });
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);
            showToast("Download started!");
          })
          .catch((err) => {
            showToast("Failed to download HTML");
            console.error("Failed to download:", err);
          });
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2000);
      }

      let keyboardSelectedIndex = -1;
      let keyboardSelectedGrid = null;

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeFullscreen();
          return;
        }

        if (
          e.key === "ArrowDown" ||
          e.key === "ArrowUp" ||
          e.key === "ArrowLeft" ||
          e.key === "ArrowRight"
        ) {
          const visibleMainCards = Array.from(
            gamesGrid.querySelectorAll(".game-card"),
          ).filter((card) => card.style.display !== "none");
          const visibleBaldiCards = Array.from(
            baldiGrid.querySelectorAll(".game-card"),
          ).filter((card) => card.style.display !== "none");

          const allVisibleCards = [...visibleMainCards, ...visibleBaldiCards];

          if (allVisibleCards.length === 0) return;

          if (keyboardSelectedIndex === -1) {
            keyboardSelectedIndex = 0;
            keyboardSelectedGrid =
              visibleMainCards.length > 0 ? "main" : "baldi";
          } else {
            const isVertical = e.key === "ArrowDown" || e.key === "ArrowUp";
            const isForward = e.key === "ArrowDown" || e.key === "ArrowRight";
            const isBackward = e.key === "ArrowUp" || e.key === "ArrowLeft";

            if (isForward) {
              keyboardSelectedIndex++;
              if (keyboardSelectedIndex >= allVisibleCards.length) {
                keyboardSelectedIndex = 0;
              }
            } else if (isBackward) {
              keyboardSelectedIndex--;
              if (keyboardSelectedIndex < 0) {
                keyboardSelectedIndex = allVisibleCards.length - 1;
              }
            }
          }

          allVisibleCards.forEach((card) =>
            card.classList.remove("keyboard-selected"),
          );
          allVisibleCards[keyboardSelectedIndex].classList.add(
            "keyboard-selected",
          );
          allVisibleCards[keyboardSelectedIndex].focus();
          e.preventDefault();
        }
      });

      window.playGame = playGame;
      window.copyUrl = copyUrl;
      window.downloadHtml = downloadHtml;
      window.closeFullscreen = closeFullscreen;
      window.toggleFullscreen = toggleFullscreen;
    </script>
  </body>
</html>
